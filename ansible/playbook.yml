---
- name: Deploy python app
  hosts: all
  become: yes
  vars:
    app_dir: /opt/app
    app_port: 8000
    app_user: ubuntu
    app_name: pythonapp

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - python3-dev
          - nginx
          - git
          - curl
        state: present

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"

    - name: Pull app from GitHub
      git:
        repo: "https://github.com/{{ lookup('env', 'GITHUB_REPOSITORY') }}.git"
        dest: "{{ app_dir }}"
        version: HEAD
        force: yes
      environment:
        GIT_TERMINAL_PROMPT: "0"
      become: yes
      become_user: "{{ app_user }}"

    - name: Write default requirements.txt if missing
      copy:
        content: |
          fastapi
          uvicorn[standard]
          gunicorn
          python-dotenv
        dest: "{{ app_dir }}/requirements.txt"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      args:
        creates: "{{ app_dir }}/requirements.txt"

    - name: Write default main.py if missing
      copy:
        content: |
          from fastapi import FastAPI

          app = FastAPI()

          @app.get("/")
          def root():
              return {"status": "ok", "app": "pythonapp"}
        dest: "{{ app_dir }}/main.py"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0644"
      args:
        creates: "{{ app_dir }}/main.py"

    - name: Create .env file with database secrets
      copy:
        content: |
          {% if database_url is defined and database_url != '' %}
          DATABASE_URL={{ database_url }}
          {% endif %}
          {% if mongo_uri is defined and mongo_uri != '' %}
          MONGO_URI={{ mongo_uri }}
          {% endif %}
          {% if db_host is defined and db_host != '' %}
          DB_HOST={{ db_host }}
          {% endif %}
          {% if db_port is defined and db_port != '' %}
          DB_PORT={{ db_port }}
          {% endif %}
          {% if db_name is defined and db_name != '' %}
          DB_NAME={{ db_name }}
          {% endif %}
          {% if db_user is defined and db_user != '' %}
          DB_USER={{ db_user }}
          {% endif %}
          {% if db_password is defined and db_password != '' %}
          DB_PASSWORD={{ db_password }}
          {% endif %}
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0600"

    - name: Create virtualenv
      command: python3 -m venv "{{ app_dir }}/venv"
      args:
        creates: "{{ app_dir }}/venv/bin/activate"
      become: yes
      become_user: "{{ app_user }}"

    - name: Install Python requirements into virtualenv
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: python3 -m venv
      become: yes
      become_user: "{{ app_user }}"

    - name: Create systemd service for python app
      copy:
        content: |
          [Unit]
          Description=pythonapp Python Application
          After=network.target

          [Service]
          User={{ app_user }}
          Group={{ app_user }}
          WorkingDirectory={{ app_dir }}
          EnvironmentFile={{ app_dir }}/.env
          ExecStart={{ app_dir }}/venv/bin/gunicorn -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:{{ app_port }} main:app
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/pythonapp.service
        owner: root
        group: root
        mode: "0644"
      notify: restart pythonapp

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable and start pythonapp service
      systemd:
        name: pythonapp
        state: started
        enabled: yes

    - name: Remove default nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: reload nginx

    - name: Configure nginx reverse proxy for python app
      copy:
        content: |
          server {
              listen 80;
              server_name _;

              location / {
                  proxy_pass http://127.0.0.1:{{ app_port }};
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 60s;
                  proxy_connect_timeout 60s;
              }
          }
        dest: /etc/nginx/sites-enabled/pythonapp
        owner: root
        group: root
        mode: "0644"
      notify: reload nginx

    - name: Ensure nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Wait for application to be ready
      wait_for:
        host: 127.0.0.1
        port: "{{ app_port }}"
        timeout: 120
        delay: 10
      register: app_wait
      ignore_errors: yes

    - name: Show journalctl logs on startup failure
      command: journalctl -u pythonapp -n 50 --no-pager
      when: app_wait is failed
      register: journal_output
      ignore_errors: yes

    - name: Print journalctl output
      debug:
        msg: "{{ journal_output.stdout_lines | default([]) }}"
      when: app_wait is failed

    - name: Fail if application did not start
      fail:
        msg: "Application failed to start on port {{ app_port }}"
      when: app_wait is failed

    - name: Print server IP on success
      debug:
        msg: "server_ip={{ ansible_host }}"

  handlers:
    - name: restart pythonapp
      systemd:
        name: pythonapp
        state: restarted
        daemon_reload: yes

    - name: reload nginx
      service:
        name: nginx
        state: reloaded